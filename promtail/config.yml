server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: cowrie
    static_configs:
      - targets:
          - localhost
        labels:
          job: cowrie
          __path__: /var/log/cowrie/cowrie.json*
    pipeline_stages:
      # Parse the JSON log line
      - json:
          expressions:
            eventid: eventid
            src_ip: src_ip
            username: username
            password: password
            input: input
            session: session
            timestamp: timestamp
      # Use Cowrie's own timestamp
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      # Promote key fields to labels for filtering in Grafana
      - labels:
          eventid:
          src_ip:
